<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3학년 우리반 자리 바꾸기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🏫 3학년 우리반 자리 바꾸기</h1>
        
        <div class="teacher-desk">교탁 (칠판)</div>

        <div class="classroom">
            <div class="column-group" id="group1"></div>
            
            <div class="column-group" id="group2"></div>
            
            <div class="column-group" id="group3"></div>
        </div>

        <div class="controls">
            <button id="shuffle-btn">🔀 자리 배치하기</button>
            <p class="notice">* 버튼을 누르면 직전 자리에서 바로 옆에 앉았던 짝꿍을 자동으로 피해 섞입니다.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
