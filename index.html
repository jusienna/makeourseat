<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3학년 우리반 자리 바꾸기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🏫 3학년 우리반 자리 바꾸기</h1>
        
        <div class="teacher-desk">교탁 (칠판)</div>

        <div class="classroom">
            <div class="group-wrapper">
                <div class="group-title">1분단 (2열 5행)</div>
                <div class="column-group" id="group1"></div>
            </div>
            
            <div class="group-wrapper">
                <div class="group-title">2분단 (2열 5행)</div>
                <div class="column-group" id="group2"></div>
            </div>
            
            <div class="group-wrapper">
                <div class="group-title">3분단 (2열 4행)</div>
                <div class="column-group" id="group3"></div>
            </div>
        </div>

        <div class="controls">
            <button id="shuffle-btn">🔀 자리 배치하기</button>
            <p class="notice">* 처음에는 1번부터 순서대로 배치되어 있으며, 버튼을 누르면 직전 짝꿍을 피해 무작위로 섞입니다.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
